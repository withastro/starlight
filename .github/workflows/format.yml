name: Format

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    if: github.repository_owner == 'withastro'
    uses: withastro/automation/.github/workflows/format.yml@e27ec6d5f4ce0aa9baf2d2071aaaf78ed6237a74 # main
    with:
      command: "format"
    secrets: inherit
